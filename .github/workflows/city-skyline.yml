name: Cidade Viva - Skyline Generator
on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Generate city-skyline.svg
        run: node scripts/city-skyline-generator.js dist/city-skyline.svg
        env:
          GITHUB_USER: ${{ github.repository_owner }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Push to output branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin output
          git checkout output
          cp dist/city-skyline.svg .
          git add city-skyline.svg
          git diff --staged --quiet || git commit -m "Update city-skyline [automated]"
          git push origin output