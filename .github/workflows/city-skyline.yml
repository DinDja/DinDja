name: Cidade Viva - Skyline Generator
on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-skyline:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Update skyline
        run: python3 .github/scripts/update_skyline.py
      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --staged --quiet || git commit -m "Update city skyline [automated]"
          git push
