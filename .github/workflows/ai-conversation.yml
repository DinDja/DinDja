name: IA Conversacional - Auto Analysis
on:
  push:
    branches: [main]
  schedule:
    - cron: "0 12 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-conversation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate conversation block
        run: |
          chmod +x .github/scripts/render-conversation.sh
          bash .github/scripts/render-conversation.sh

      - name: Update README
        run: |
          python3 << 'PYEOF'
with open('README.md', 'r') as f:
    content = f.read()
with open('/tmp/conversation.txt', 'r') as f:
    conversation = f.read()
start = content.find('SYSTEM LOG')
if start > -1:
    block_start = content.rfind('```', 0, start)
    block_end = content.find('```', block_start + 3) + 3
    content = content[:block_start] + conversation + content[block_end:]
with open('README.md', 'w') as f:
    f.write(content)
PYEOF

      - name: Commit & Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --staged --quiet || git commit -m "Update AI conversation [automated]"
          git push