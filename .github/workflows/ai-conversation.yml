name: IA Conversacional - Auto Analysis
on:
  push:
    branches: [main]
  schedule:
    - cron: "0 12 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-conversation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Gather data
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PRS=$(gh api search/issues --method GET -f q="author:DinDja type:pr state:open" --jq '.total_count' 2>/dev/null || echo 3)
          BUGS=$(gh api search/issues --method GET -f q="author:DinDja label:bug state:open" --jq '.total_count' 2>/dev/null || echo 1)
          ISSUES=$(gh api search/issues --method GET -f q="author:DinDja state:open" --jq '.total_count' 2>/dev/null || echo 5)
          echo "OPEN_PRS=$PRS" >> $GITHUB_ENV
          echo "BUGS=$BUGS" >> $GITHUB_ENV
          echo "ISSUES=$ISSUES" >> $GITHUB_ENV
      - name: Update conversation
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python3 .github/scripts/update_conversation.py
      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --staged --quiet || git commit -m "Update AI conversation [automated]"
          git push
