name: IA Conversacional - Auto Analysis
on:
  push:
    branches: [main]
  schedule:
    - cron: "0 12 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Generate ai-conversation.svg
        run: node scripts/conversation-generator.js dist/ai-conversation.svg
        env:
          GITHUB_USER: ${{ github.repository_owner }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Push to output branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin output
          git checkout output
          cp dist/ai-conversation.svg .
          git add ai-conversation.svg
          git diff --staged --quiet || git commit -m "Update ai-conversation [automated]"
          git push origin output