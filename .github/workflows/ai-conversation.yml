name: IA Conversacional - Auto Analysis
on:
  push:
    branches: [main]
  schedule:
    - cron: "0 12 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-conversation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Collect workspace intelligence
        run: |
          chmod +x .github/scripts/generate-readme-data.sh
          source .github/scripts/generate-readme-data.sh

          REPOS=("Editor-ThreeJS" "SECTI-contratos" "TSARA" "hubSECTI" "PatentesLab" "Sectinvent-rio")
          OUTPUT=""
          STATUS_MAP=()

          for repo in "${REPOS[@]}"; do
            STATUS=$(gh api repos/DinDja/$repo/commits/main/status --jq '.state' 2>/dev/null || echo "pending")
            case "$STATUS" in
              success) ICON="🟢"; LABEL="Build OK" ;;
              failure) ICON="🔴"; LABEL="Build FAIL" ;;
              pending) ICON="🟡"; LABEL="Pending" ;;
              *)       ICON="⚪"; LABEL="Unknown" ;;
            esac
            STATUS_MAP["$repo"]="$ICON|$LABEL"
          done

          BUGS=$(gh api search/issues --method GET -f q="author:DinDja label:bug state:open" --jq '.total_count' 2>/dev/null || echo "1")
          ISSUES=$(gh api search/issues --method GET -f q="author:DinDja state:open" --jq '.total_count' 2>/dev/null || echo "5")

          cat > /tmp/conversation.txt << CONVEOF
\`\`\`
╔═══════════════════════════════════════════════════════════════════╗
║  SYSTEM LOG — Auto-análise do Workspace                           ║
╚═══════════════════════════════════════════════════════════════════╝

SYSTEM
Bom dia.

> Projetos ativos?

WORKSPACE
┌─────────────────────────────────────────────────────────┐
CONVEOF

          for repo in "${REPOS[@]}"; do
            IFS='|' read -r ICON LABEL <<< "${STATUS_MAP[$repo]}"
            FILES=$(gh api repos/DinDja/$repo --jq '.size' 2>/dev/null || echo "~")
            echo "│ $ICON $repo$(printf '%*s' $((25 - ${#repo})) '')│ $LABEL$(printf '%*s' $((12 - ${#LABEL})) '')│ ${FILES}KB$(printf '%*s' $((8)) '')│" >> /tmp/conversation.txt
          done

          cat >> /tmp/conversation.txt << CONVEOF2
└─────────────────────────────────────────────────────────┘

> Status?

CI/CD
┌─────────────────────────────────────────────────────────┐
│ ✅ GitHub Actions   │ 3 workflows ativos               │
│ ✅ Vercel           │ Deploy automático habilitado     │
│ ✅ Netlify          │ Functions serverless ativas      │
│ ✅ Firebase         │ 6 projetos conectados            │
└─────────────────────────────────────────────────────────┘

> Pendências?

TASKS
┌─────────────────────────────────────────────────────────┐
│ 🔵 ${OPEN_PRS:-3} PRs abertos                                        │
│ 🟡 $((ISSUES - OPEN_PRS - BUGS)) issues em progresso                                │
│ 🔴 ${BUGS:-1} bug(s) crítico(s)                                      │
│ ⚪ $((TOTAL_IMPROVEMENTS)) melhorias sugeridas                               │
└─────────────────────────────────────────────────────────┘

> Objetivo?

MISSION
┌─────────────────────────────────────────────────────────┐
│ "Construir um ecossistema completo de ferramentas      │
│  3D, enterprise e IA — integrando criatividade,        │
│  produtividade e inovação tecnológica."                │
└─────────────────────────────────────────────────────────┘
\`\`\`
CONVEOF2

      - name: Update README Conversation
        run: |
          python3 -c "
with open('README.md', 'r') as f:
    content = f.read()
with open('/tmp/conversation.txt', 'r') as f:
    conversation = f.read()

start = content.find('SYSTEM LOG')
if start > -1:
    block_start = content.rfind('\`\`\`', 0, start)
    block_end = content.find('\`\`\`', block_start + 3) + 3
    content = content[:block_start] + conversation + content[block_end:]

with open('README.md', 'w') as f:
    f.write(content)
"

      - name: Commit & Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --staged --quiet || git commit -m "🤖 Update AI conversation [automated]"
          git push