name: Terminal Interativo - Auto Update
on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-terminal:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate terminal block
        run: |
          chmod +x .github/scripts/render-terminal.sh
          bash .github/scripts/render-terminal.sh

      - name: Update README
        run: |
          python3 << 'PYEOF'
with open('README.md', 'r') as f:
    content = f.read()
with open('/tmp/terminal-block.txt', 'r') as f:
    terminal = f.read()
start = content.find('root@workspace:~')
if start > -1:
    block_start = content.rfind('```bash', 0, start)
    block_end = content.find('```', block_start + 7) + 3
    content = content[:block_start] + terminal + content[block_end:]
with open('README.md', 'w') as f:
    f.write(content)
PYEOF

      - name: Commit & Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --staged --quiet || git commit -m "Update terminal simulator [automated]"
          git push