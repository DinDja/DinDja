name: Terminal Interativo - Auto Update
on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Generate terminal-interactive.svg
        run: node scripts/terminal-generator.js dist/terminal-interactive.svg
        env:
          GITHUB_USER: ${{ github.repository_owner }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Push to output branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin output
          git checkout output
          cp dist/terminal-interactive.svg .
          git add terminal-interactive.svg
          git diff --staged --quiet || git commit -m "Update terminal-interactive [automated]"
          git push origin output