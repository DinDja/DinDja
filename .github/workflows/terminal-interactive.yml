name: Terminal Interativo - Auto Update
on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-terminal:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Gather data
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TODAY=$(gh api search/commits --method GET -f q="author:DinDja committer-date:>=$(date +%Y-%m-%d)" --jq '.total_count' 2>/dev/null || echo 0)
          PRS=$(gh api search/issues --method GET -f q="author:DinDja type:pr state:open" --jq '.total_count' 2>/dev/null || echo 0)
          echo "TODAY_COMMITS=$TODAY" >> $GITHUB_ENV
          echo "OPEN_PRS=$PRS" >> $GITHUB_ENV
          echo "ROADMAP_PCT=82" >> $GITHUB_ENV
      - name: Update terminal
        run: python3 .github/scripts/update_terminal.py
      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --staged --quiet || git commit -m "Update terminal simulator [automated]"
          git push
